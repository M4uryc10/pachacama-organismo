name: Evolución del Organismo

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librería de Google AI
        run: pip install google-generativeai

      - name: Ejecutar script de evolución
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python evolve.py

      - name: Guardar los cambios (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Evolución autoconsciente: Sistema actualizado por IA" || exit 0
          git push
